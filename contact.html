<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
    <style>
        body {
            background-color: black;
            color: gold;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
        }

        nav {
            margin-top: 20px;
        }

        nav a {
            color: gold;
            text-decoration: none;
            margin: 0 10px;
            font-weight: bold;
            font-size: 18px;
        }

        nav a:hover {
            color: darkgoldenrod;
        }

        h1 {
            margin-top: 40px;
        }

        form {
            margin-top: 20px;
        }

        input, textarea {
            padding: 10px;
            margin: 8px;
            border-radius: 5px;
            border: 1px solid gold;
            width: 260px;
            background-color: black;
            color: gold;
        }

        textarea {
            height: 100px;
            resize: none;
        }

        button {
            background-color: gold;
            color: black;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 18px;
            border-radius: 5px;
            margin-top: 10px;
        }

        button:hover {
            background-color: darkgoldenrod;
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html">Home</a> |
        <a href="join.html">Investments</a> |
        <a href="contact.html">Contact</a>
    </nav>

    <h1>Contact Us</h1>
    <p>Fill the form below to reach us:</p>

    <form>
        <input type="text" placeholder="Your Name" required><br>
        <input type="email" placeholder="Your Email" required><br>
        <textarea placeholder="Your Message" required></textarea><br>
        <button type="submit">Send Message</button>
    </form>

</body>
</html>
